name: Publish NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CONFIGURATION: Release
      PACKAGE_OUTPUT: artifacts/packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore DeepSeek.slnx

      - name: Test
        run: dotnet test DeepSeek.slnx --configuration "$CONFIGURATION" --no-restore

      - name: Resolve package version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          $refName = "${{ github.ref_name }}"

          if (-not $ref.StartsWith("refs/tags/v")) {
            throw "NuGet publish must be run from a version tag like 'v1.0.2'. Current ref: '$ref' (ref_name: '$refName')."
          }

          $version = $refName
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to resolve package version from ref '$ref' (ref_name: '$refName')."
          }
          Write-Host "Resolved package version: $version"
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Pack DeepSeek.Core
        run: dotnet pack src/DeepSeek.Core/DeepSeek.Core.csproj --configuration "$CONFIGURATION" --no-restore --output "$PACKAGE_OUTPUT" -p:ContinuousIntegrationBuild=true -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Pack DeepSeek.Agents.AI
        run: dotnet pack src/DeepSeek.Agents.AI/DeepSeek.Agents.AI.csproj --configuration "$CONFIGURATION" --no-restore --output "$PACKAGE_OUTPUT" -p:ContinuousIntegrationBuild=true -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Validate NuGet API key
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "GitHub Actions secret NUGET_API_KEY is not configured."
          }
          Write-Host "NUGET_API_KEY is configured."

      - name: List packages
        shell: pwsh
        run: Get-ChildItem $env:PACKAGE_OUTPUT | Select-Object Name,Length

      - name: Validate package files
        shell: pwsh
        run: |
          $corePackage = Join-Path $env:PACKAGE_OUTPUT "DeepSeek.Core.$env:PACKAGE_VERSION.nupkg"
          $agentsPackage = Join-Path $env:PACKAGE_OUTPUT "DeepSeek.Agents.AI.$env:PACKAGE_VERSION.nupkg"

          if (-not (Test-Path $corePackage)) {
            throw "Package file not found: $corePackage"
          }

          if (-not (Test-Path $agentsPackage)) {
            throw "Package file not found: $agentsPackage"
          }

          Write-Host "Validated package files:"
          Write-Host " - $corePackage"
          Write-Host " - $agentsPackage"

      - name: Publish DeepSeek.Core
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "$env:PACKAGE_OUTPUT/DeepSeek.Core.$env:PACKAGE_VERSION.nupkg" `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate `
            --no-symbols

      - name: Publish DeepSeek.Agents.AI
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "$env:PACKAGE_OUTPUT/DeepSeek.Agents.AI.$env:PACKAGE_VERSION.nupkg" `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate `
            --no-symbols
